# Cross-platform release build for Eaon (the Tauri app in eaon-tauri/).
#
# WHY THIS EXISTS: Eaon's Windows + Linux builds ARE the Tauri app; the
# flagship macOS app is a separate native SwiftUI project (Eaon-desktop/)
# built with Xcode. This workflow deliberately builds ONLY Windows and Linux
# and never touches the macOS app — the Mac release is produced separately and
# is not this pipeline's job.
#
# It runs on real windows-latest and ubuntu runners (you don't need a Windows
# or Linux PC — this is how you produce and test the installers from a Mac),
# and on a version tag it publishes a DRAFT GitHub Release with every
# platform's installers attached, so nothing goes public until you review and
# press Publish. A matrix build is the documented tauri-action multi-OS
# pattern: it creates the release once (keyed on the tag) and each job uploads
# its own platform's bundles to it.
name: Release (Windows + Linux)

on:
  push:
    tags:
      - "v*" # e.g. git tag v2026.2.0 && git push origin v2026.2.0
  # Manual runs build the installers WITHOUT creating a release — handy for
  # checking the build is green before you cut a real tag.
  workflow_dispatch:

# tauri-action creates the GitHub Release, which needs write access to
# repository contents. (Default GITHUB_TOKEN perms are read-only on many repos.)
permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel Linux just because Windows failed (or vice versa) — a
      # green build for one OS is still worth shipping.
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: ubuntu-22.04
            label: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux (WebKitGTK) system dependencies Tauri needs to bundle. No-op on
      # Windows, which uses the OS's built-in WebView2.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eaon-tauri/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Caches src-tauri/target keyed on Cargo.lock so repeat builds are fast.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: eaon-tauri/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        working-directory: eaon-tauri
        run: npm ci

      # On a tag push, stamp the app version from the tag (v2026.2.0 ->
      # 2026.2.0) so the installer's version matches the release, then let
      # tauri-action build + publish. tauri-action runs the config's
      # beforeBuildCommand (npm run build) and bundles per platform:
      # NSIS (.exe) + MSI on Windows; .deb + .AppImage on Linux.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: eaon-tauri
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')" "$VERSION"
          echo "Set tauri.conf.json version to $VERSION"

      - name: Build & publish release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: eaon-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Eaon ${{ github.ref_name }}"
          releaseBody: |
            Cross-platform builds of Eaon.

            - **Windows:** download the **`.exe`** installer.
            - **Linux:** download the **`.AppImage`** (portable, runs anywhere) or the **`.deb`** (Debian/Ubuntu).

            **Heads up — these builds are not code-signed yet.** On Windows,
            SmartScreen shows a blue "Windows protected your PC" box: click
            **More info** → **Run anyway**. This is expected for unsigned apps
            and goes away once the app is signed.
          releaseDraft: true # published as a DRAFT — review, then hit Publish
          prerelease: false

      # ---- Manual (workflow_dispatch) path: build only, no release ----
      - name: Build installers only (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: eaon-tauri

      # ---- Fix AppImage: strip bundled libglvnd + wayland ----
      #
      # Tauri's AppImage bundler (linuxdeploy-plugin-gtk) copies Ubuntu-compiled
      # libglvnd (libGL/libEGL/libGLX/libGLdispatch) and libwayland-client/
      # libwayland-egl into the squashfs. On non-Ubuntu distros (Fedora, Arch,
      # NixOS, …) these conflict with the host's Mesa EGL stack, causing:
      #   "Could not create default EGL display: EGL_BAD_PARAMETER. Aborting..."
      #
      # These libs are part of every desktop Linux since 2017. Dropping them
      # lets the host provide a self-consistent graphics stack.
      # https://github.com/tauri-apps/tauri/issues/11994
      - name: Fix AppImage (strip libglvnd + wayland)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUNDLE_DIR="eaon-tauri/src-tauri/target/release/bundle/appimage"
          APPIMAGE=$(find "$BUNDLE_DIR" -maxdepth 1 -name '*.AppImage' -type f -print -quit 2>/dev/null || true)

          if [ -z "$APPIMAGE" ]; then
            echo "::warning::No AppImage found in $BUNDLE_DIR — skipping libglvnd strip"
            exit 0
          fi

          # Resolve to absolute paths before pushd into tmpdir
          APPIMAGE=$(realpath "$APPIMAGE")
          BUNDLE_DIR=$(dirname "$APPIMAGE")

          echo "Fixing AppImage: $APPIMAGE"
          chmod +x "$APPIMAGE"

          WORKDIR=$(mktemp -d)
          pushd "$WORKDIR" >/dev/null

          # Extract the squashfs
          "$APPIMAGE" --appimage-extract >/dev/null

          # Drop the libglvnd halves + Mesa GBM + libwayland-egl/client/server.
          # These are standard on every desktop Linux distro; bundling them
          # caused the loader/dispatch ABI mismatch that aborts the WebKit GPU
          # process with EGL_BAD_PARAMETER on non-Ubuntu distros.
          DELETED=$(find squashfs-root \( -type f -o -type l \) \( \
              -name 'libGL.so*' -o \
              -name 'libEGL.so*' -o \
              -name 'libGLX.so*' -o \
              -name 'libGLdispatch.so*' -o \
              -name 'libgbm.so*' -o \
              -name 'libwayland-egl.so*' -o \
              -name 'libwayland-client.so*' -o \
              -name 'libwayland-server.so*' \
              \) -print -delete 2>/dev/null | wc -l)
          echo "Removed $DELETED conflicting libraries from AppImage"

          # Download appimagetool (static, no deps)
          ARCH=$(uname -m)
          curl -fsSL --retry 3 -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage"
          chmod +x appimagetool

          # Repack — use the original filename in the bundle dir
          REPACKED="${BUNDLE_DIR}/$(basename "$APPIMAGE")"
          rm -f "$REPACKED" "$REPACKED.sig"
          ARCH="$ARCH" ./appimagetool --no-appstream squashfs-root "$REPACKED"
          echo "Repacked: $REPACKED ($(du -h "$REPACKED" | cut -f1))"

          popd >/dev/null
          rm -rf "$WORKDIR"

          # Re-sign if a Tauri signing key is configured
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "Re-signing AppImage with Tauri key…"
            npx --yes @tauri-apps/cli@^2 signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
              "$REPACKED"
          fi

          # For tag pushes: re-upload the fixed AppImage to the release
          # (overwrites the original that tauri-action uploaded)
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            echo "Uploading fixed AppImage to release ${GITHUB_REF_NAME}…"
            gh release upload "${GITHUB_REF_NAME}" "$REPACKED" \
              ${TAURI_SIGNING_PRIVATE_KEY:+--clobber} || true
            # Also upload the .sig if it was generated
            [ -f "$REPACKED.sig" ] && \
              gh release upload "${GITHUB_REF_NAME}" "$REPACKED.sig" --clobber || true
          fi

      - name: Upload installer artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: eaon-${{ matrix.label }}-installers
          path: |
            eaon-tauri/src-tauri/target/release/bundle/nsis/*.exe
            eaon-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            eaon-tauri/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
